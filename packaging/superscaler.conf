; Path to the supervisor unix socket for xml rpc communication
; It can be unix:///var/run/supervisor.sock or unix:///tmp/supervisor.sock
[supervisor]
unix_socket_path = unix:///var/run/supervisor.sock
username =
password =

; Queue backend definitions. Each section defines a named backend that
; targets can reference. The type parameter selects the backend driver.
;
; Supported types:
;   rabbitmq  - RabbitMQ via AMQP (pika)
;   redis     - Redis lists via llen
;
; RabbitMQ parameters:
;   host      RabbitMQ server hostname (e.g., 127.0.0.1)
;   port      AMQP port (e.g., 5672)
;   username  RabbitMQ username (e.g., guest)
;   password  RabbitMQ password (e.g., guest)
;   vhost     Virtual host (e.g., /)
;
; Redis parameters:
;   host      Redis server hostname (e.g., 127.0.0.1)
;   port      Redis port (e.g., 6379)
;   password  Redis password, leave blank if none
;   db        Redis DB index (e.g., 0)

[queue:cache-redis]
type = redis
host = 127.0.0.1
port = 6379
password =
db = 0

;[queue:main-rabbit]
;type = rabbitmq
;host = 127.0.0.1
;port = 5672
;username = guest
;password = guest
;vhost = /

; Each target maps a queue to a supervisor process group.
;
; Required parameters:
;   queue            Name of a [queue:*] section to monitor
;   queue_name       Queue name in the backend to monitor
;   program_name     The exact Supervisor program name to be autoscaled
;   tasks_per_worker Number of pending tasks per worker to target
;   min_workers      Minimum worker process count
;   max_workers      Maximum worker process count
;
; Optional parameters (default values shown):
;   poll_interval    = 10   ; Seconds between queue checks
;   scale_up_step    = 1    ; Maximum workers to add per scaling action
;   scale_down_step  = 1    ; Maximum workers to remove per scaling action
;   cooldown_up      = 0    ; Seconds to wait before next scale up
;   cooldown_down    = 0    ; Seconds to wait before next scale down

[target:main-scaler]
queue = main-rabbit
queue_name = tasks
program_name = example-worker
tasks_per_worker = 50
min_workers = 2
max_workers = 10

;[target:example-scaler]
;queue = main-rabbit
;queue_name = tasks
;program_name = example-worker
;tasks_per_worker = 50
;min_workers = 2
;max_workers = 10
;poll_interval = 2
;scale_up_step = 2
;scale_down_step = 1
;cooldown_up = 10
;cooldown_down = 20