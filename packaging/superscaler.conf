[redis]
host = 127.0.0.1
port = 6379
password =
db = 0

[supervisor]
; Path to the supervisor unix socket for xml rpc communication
; It can be unix:///var/run/supervisor.sock or unix:///tmp/supervisor.sock
unix_socket_path = unix:///var/run/supervisor.sock
username =
password =

; Each target maps a redis queue to a supervisor process group
;
; Required parameters:
;   queue_key        Redis list key to monitor
;   program_name     The exact Supervisor program name to be autoscaled
;   tasks_per_worker Number of pending tasks per worker to target
;   min_workers      Minimum worker process count
;   max_workers      Maximum worker process count
;
; Optional parameters (default values shown):
;   poll_interval    = 10   ; Seconds between queue checks
;   scale_up_step    = 1    ; Maximum workers to add per scaling action
;   scale_down_step  = 1    ; Maximum workers to remove per scaling action
;   cooldown_up      = 5    ; Seconds to wait before next scale up
;   cooldown_down    = 10   ; Seconds to wait before next scale down
;   pending_timeout  = 10   ; Seconds to wait for a stopping worker before giving up

;[target:example-worker]
;queue_key = queues:example
;program_name = example-worker
;poll_interval = 2
;tasks_per_worker = 50
;min_workers = 2
;max_workers = 10
;scale_up_step = 2
;scale_down_step = 1
;cooldown_up = 10
;cooldown_down = 30
;pending_timeout = 120